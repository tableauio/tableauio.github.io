get-started:
  other: 开始使用
features:
  fast:
    title: ⚡ 极速
    content: 数秒内即可转换数千个 Excel/CSV/XML/YAML 文件。
  scaffolding:
    title: 🛠️ 脚手架
    content: 基于 protoc 插件系统，自动生成配置 Loader 和 Checker 脚手架代码。
  platform:
    title: 🧊 跨平台
    content: Tableau 工具链支持 Windows、macOS 和 Linux 多平台运行。
  schema:
    title: ♾️ Schema
    content: 基于 Protobuf 精心设计的 IDL Protoconf，用于定义 Excel/CSV/XML/YAML 文件结构。
  format:
    title: 📚 多格式
    content: 支持将 Excel/CSV/XML/YAML 导出为多种格式：JSON、Text 和 Bin。
  language:
    title: 🔣 多语言
    content: 得益于 Protobuf 生态，支持 C++、C#、Go、Java、Python、Lua、TS/JS 等多种语言接入。
